{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="card shadow-sm border-0 p-4">
        <h4 class="text-center mb-4 fw-bold">Recuperar contraseña</h4>

        <form method="post" action="{% url 'account_reset_password' %}">
          {% csrf_token %}
          {{ form|crispy }}
          <button class="btn btn-success w-100 mt-3">Enviar enlace de recuperación</button>
        </form>

        <div class="text-center mt-4">
          <span class="text-muted">¿Recordaste tu contraseña?</span>
          <a href="{% url 'account_login' %}">Iniciar sesión</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
