{% extends "base.html" %}
{% load crispy_forms_tags %}
{% load socialaccount %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-4 col-md-6">
      <div class="card shadow-sm border-0 p-4">
        <h4 class="text-center mb-4 fw-bold">Crear cuenta</h4>

        <form method="post" action="{% url 'account_signup' %}">
          {% csrf_token %}
          {{ form|crispy }}
          <button class="btn btn-success w-100 mt-3">Crear cuenta</button>
        </form>

        <div class="text-center my-3">
          <hr>
          <span class="text-muted small">o</span>
        </div>

        <a href=""
           class="btn btn-outline-dark w-100 d-flex align-items-center justify-content-center gap-2">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" width="18">
          Registrarse con Google
        </a>

        <div class="text-center mt-4">
          <span class="text-muted">¿Ya tienes cuenta?</span>
          <a href="{% url 'account_login' %}">Iniciar sesión</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
