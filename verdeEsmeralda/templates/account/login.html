{% extends "base.html" %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-4 col-md-6">

<div class="card shadow-sm border-0 p-4">

<h4 class="text-center mb-4 fw-bold">Iniciar sesión</h4>

<form method="post">
{% csrf_token %}

<div class="mb-3">

<label class="form-label">Usuario o Email</label>

<input
type="text"
name="login"
class="form-control"
placeholder="Ingresa tu usuario o email"
required
>

</div>

<div class="mb-3">

<label class="form-label">Contraseña</label>

<input
type="password"
name="password"
class="form-control"
placeholder="Ingresa tu contraseña"
required
>

</div>

<div class="mb-3 text-end">

<a href="{% url 'account_reset_password' %}" class="small">
¿Olvidaste tu contraseña?
</a>

</div>

<button class="btn btn-success w-100">
Entrar
</button>

</form>


<div class="text-center my-3">

<hr>
<span class="text-muted small">o</span>

</div>


<a
href="{% load socialaccount %}"
class="btn btn-outline-dark w-100 d-flex align-items-center justify-content-center gap-2"
>

<img
src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
width="18"
>

Continuar con Google

</a>


<div class="text-center mt-4">

<span class="text-muted">¿No tienes cuenta?</span>

<a href="{% url 'account_signup' %}">
Crear cuenta
</a>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
